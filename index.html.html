<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🔮  Tarot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(-45deg,#2b0035,#6200a8,#3c0066,#14001d);
background-size:400% 400%;
animation:fundo 12s infinite alternate;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;

}

@keyframes fundo{

0%{background-position:left;}
100%{background-position:right;}

}

.container{

width:100%;
max-width:1100px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

padding:35px;

border-radius:20px;

box-shadow:0 0 40px rgba(0,0,0,.5);

}

h1{

text-align:center;
font-size:42px;

margin-bottom:10px;

}

h3{

text-align:center;
font-weight:normal;
margin-bottom:30px;

}

textarea{

width:100%;

height:120px;

resize:none;

padding:20px;

border:none;

border-radius:12px;

font-size:18px;

margin-bottom:20px;

outline:none;

}

.botoes{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

margin-bottom:30px;

}

button{

padding:15px 30px;

font-size:18px;

border:none;

border-radius:12px;

cursor:pointer;

background:gold;

transition:.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 15px gold;

}

.cartas{

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

margin-top:20px;

}

.carta{

width:190px;

height:300px;

position:relative;

transform-style:preserve-3d;

transition:1s;

cursor:pointer;

}

.carta.virada{

transform:rotateY(180deg);

}

.frente,.verso{

position:absolute;

width:100%;

height:100%;

border-radius:15px;

backface-visibility:hidden;

display:flex;

justify-content:center;

align-items:center;

}

.frente{

background:linear-gradient(135deg,#6d00c9,#bc00ff);

font-size:40px;

}

.verso{

background:white;

color:#222;

transform:rotateY(180deg);

padding:15px;

display:flex;

flex-direction:column;

justify-content:center;

text-align:center;

}

.nomeCarta{

font-size:24px;

font-weight:bold;

margin-bottom:10px;

}

.significado{

font-size:15px;

line-height:22px;

}

#interpretacao{

margin-top:40px;

background:rgba(255,255,255,.12);

padding:20px;

border-radius:15px;

display:none;

}

#interpretacao h2{

margin-bottom:15px;

}

#textoResposta{

line-height:28px;

font-size:18px;

}

footer{

margin-top:40px;

text-align:center;

}

footer button{

background:#00d4ff;

color:white;

}

</style>

</head>

<body>

<div class="container">

<h1> TAROT</h1>

<h3>Faça sua pergunta, embaralhe e revele as cartas.</h3>

<textarea
id="pergunta"
placeholder="Digite sua pergunta aqui..."></textarea>

<div class="botoes">

<button onclick="embaralhar()">

🃏 Embaralhar

</button>

<button onclick="interpretarLeitura()">

🔮 Interpretar

</button>


</div>

<div class="cartas">

<div class="carta" onclick="virar(this,0)">

<div class="frente">🂠</div>

<div class="verso">

<div class="nomeCarta"></div>

<div class="significado"></div>

</div>

</div>

<div class="carta" onclick="virar(this,1)">

<div class="frente">🂠</div>

<div class="verso">

<div class="nomeCarta"></div>

<div class="significado"></div>

</div>

</div>

<div class="carta" onclick="virar(this,2)">

<div class="frente">🂠</div>

<div class="verso">

<div class="nomeCarta"></div>

<div class="significado"></div>

</div>

</div>

</div>

<div id="interpretacao">

<h2>✨ Interpretação da Tiragem</h2>

<p id="textoResposta"></p>

</div>

<footer>
<div style="margin-top:40px;text-align:center;">

<h3>📞 Contato para Consulta</h3>

<p>Fale diretamente no WhatsApp:</p>

<br>

<button onclick="window.open('https://wa.me/5521920152630?text=Olá! Vim pelo site Let Tarot e gostaria de uma consulta.','_blank')"
style="
padding:15px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;">
💬 WhatsApp 1 - (21) 92015-2630
</button>

<br>
</div>
</footer>

</div>

<!--
A PARTE 2 (JavaScript) será inserida aqui,
logo antes do </body>.
-->
<script>

const deck=[
{nome:"O Louco",sig:"Novos começos, liberdade, espontaneidade."},
{nome:"O Mago",sig:"Iniciativa, habilidade e ação."},
{nome:"A Sacerdotisa",sig:"Intuição, silêncio e conhecimento oculto."},
{nome:"A Imperatriz",sig:"Abundância, crescimento e criatividade."},
{nome:"O Imperador",sig:"Estrutura, liderança e estabilidade."},
{nome:"O Hierofante",sig:"Aprendizado, tradição e orientação."},
{nome:"Os Enamorados",sig:"Escolhas, união e relacionamentos."},
{nome:"O Carro",sig:"Movimento, conquista e determinação."},
{nome:"A Força",sig:"Coragem, autocontrole e perseverança."},
{nome:"O Eremita",sig:"Reflexão, prudência e sabedoria."},
{nome:"A Roda da Fortuna",sig:"Mudanças, ciclos e destino."},
{nome:"A Justiça",sig:"Equilíbrio, responsabilidade e verdade."},
{nome:"O Enforcado",sig:"Nova perspectiva e espera."},
{nome:"A Morte",sig:"Transformação, encerramento e renovação."},
{nome:"A Temperança",sig:"Harmonia, moderação e cura."},
{nome:"O Diabo",sig:"Apegos, tentações e limitações."},
{nome:"A Torre",sig:"Rupturas, revelações e mudanças repentinas."},
{nome:"A Estrela",sig:"Esperança, inspiração e fé."},
{nome:"A Lua",sig:"Mistérios, emoções e intuição."},
{nome:"O Sol",sig:"Sucesso, clareza e felicidade."},
{nome:"O Julgamento",sig:"Renascimento, chamado e despertar."},
{nome:"O Mundo",sig:"Conclusão, realização e plenitude."}
];

let leitura=[];

function embaralhar(){

let usadas=[];

leitura=[];

document.getElementById("interpretacao").style.display="none";

document.querySelectorAll(".carta").forEach(c=>{
c.classList.remove("virada");
});

document.querySelectorAll(".verso").forEach(v=>{

let i;

do{
i=Math.floor(Math.random()*deck.length);
}while(usadas.includes(i));

usadas.push(i);

const carta=deck[i];

leitura.push(carta);

v.querySelector(".nomeCarta").innerHTML=carta.nome;
v.querySelector(".significado").innerHTML=carta.sig;

});

}

function virar(carta){
carta.classList.toggle("virada");
}

function interpretarLeitura(){

const pergunta=document.getElementById("pergunta").value.trim();

if(pergunta===""){
alert("Digite sua pergunta.");
return;
}

let resposta=`

<b>Pergunta:</b><br><br>

${pergunta}

<br><br>

<b>Primeira Carta</b><br>

${leitura[0].nome}

<br>

${leitura[0].sig}

<br><br>

<b>Segunda Carta</b><br>

${leitura[1].nome}

<br>

${leitura[1].sig}

<br><br>

<b>Terceira Carta</b><br>

${leitura[2].nome}

<br>

${leitura[2].sig}

<br><br>

<b>Interpretação da Combinação</b>

<br><br>

`;

resposta+=combinar(
leitura[0].nome,
leitura[1].nome,
leitura[2].nome
);

document.getElementById("textoResposta").innerHTML=resposta;

document.getElementById("interpretacao").style.display="block";

}



function combinar(a,b,c){

const cartas=[a,b,c];

const tem=n=>cartas.includes(n);

let texto=[];

if(tem("O Louco"))
texto.push("• O Louco representa novos começos, espontaneidade e abertura para novas experiências.");

if(tem("O Mago"))
texto.push("• O Mago destaca iniciativa, habilidade e capacidade de transformar ideias em ação.");

if(tem("A Sacerdotisa"))
texto.push("• A Sacerdotisa convida à observação, à escuta da intuição e ao conhecimento interior.");

if(tem("A Imperatriz"))
texto.push("• A Imperatriz simboliza crescimento, criatividade e desenvolvimento.");

if(tem("O Imperador"))
texto.push("• O Imperador enfatiza organização, estabilidade e responsabilidade.");

if(tem("Os Enamorados"))
texto.push("• Os Enamorados indicam escolhas importantes e relacionamentos.");

if(tem("O Carro"))
texto.push("• O Carro favorece avanço, foco e determinação.");

if(tem("A Força"))
texto.push("• A Força fala de coragem, autocontrole e perseverança.");

if(tem("O Eremita"))
texto.push("• O Eremita recomenda reflexão antes de agir.");

if(tem("A Roda da Fortuna"))
texto.push("• A Roda da Fortuna sugere mudanças e ciclos em movimento.");

if(tem("A Justiça"))
texto.push("• A Justiça destaca equilíbrio, honestidade e consequências das escolhas.");

if(tem("O Enforcado"))
texto.push("• O Enforcado convida a enxergar a situação por outro ponto de vista.");

if(tem("A Morte"))
texto.push("• A Morte representa transformação e encerramento de um ciclo.");

if(tem("A Temperança"))
texto.push("• A Temperança favorece conciliação, paciência e harmonia.");

if(tem("O Diabo"))
texto.push("• O Diabo chama atenção para apegos, excessos ou limitações.");

if(tem("A Torre"))
texto.push("• A Torre indica rupturas, revelações e mudanças inesperadas.");

if(tem("A Estrela"))
texto.push("• A Estrela inspira esperança, confiança e renovação.");

if(tem("A Lua"))
texto.push("• A Lua sugere lidar com emoções, incertezas e aspectos ocultos.");

if(tem("O Sol"))
texto.push("• O Sol representa clareza, vitalidade e energia positiva.");

if(tem("O Julgamento"))
texto.push("• O Julgamento simboliza renovação, avaliação e novos rumos.");

if(tem("O Mundo"))
texto.push("• O Mundo indica conclusão de um ciclo e sensação de realização.");

if(tem("O Sol") && tem("A Estrela"))
texto.push("<br><b>Combinação:</b> Sol + Estrela reforça esperança, confiança e clareza de propósito.");

if(tem("A Lua") && tem("A Justiça"))
texto.push("<br><b>Combinação:</b> Lua + Justiça sugere equilibrar emoção e razão antes de decidir.");

if(tem("O Carro") && tem("A Força"))
texto.push("<br><b>Combinação:</b> Carro + Força destaca persistência para superar desafios.");

if(tem("A Torre") && tem("A Estrela"))
texto.push("<br><b>Combinação:</b> Torre + Estrela pode representar renovação após uma mudança significativa.");

if(tem("A Temperança") && tem("O Mundo"))
texto.push("<br><b>Combinação:</b> Temperança + Mundo favorece integração, equilíbrio e conclusão de processos.");

if(texto.length===0)
texto.push("As três cartas podem ser interpretadas em conjunto considerando os significados simbólicos apresentados em cada uma.");

return texto.join("<br><br>");

}







embaralhar();

</script>
</body>
</html>
